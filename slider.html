<!DOCTYPE html>
<html lang="chinese">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Image Slider</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero-slider">
    <div class="slider-container">
      <!-- Slides -->
      <div class="slide active">
        <img src="./img/heroSec5.jpg" alt="Slide 1">
        <div class="content">
          <h1>Welcome to Our World</h1>
          <p>Building modern web experiences</p>
        </div>
      </div>

      <div class="slide">
        <img src="./img/heroSec30.jpg" alt="Slide 2">
        <div class="content">
          <h1>Creative & Unique</h1>
          <p>Design. Develop. Deploy.</p>
        </div>
      </div>

      <div class="slide">
        <img src="./img/heroSec28.jpg" alt="Slide 3">
        <div class="content">
          <h1>Grow with Us</h1>
          <p>Join our journey of innovation</p>
        </div>
      </div>

      <!-- Navigation Arrows -->
      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>

      <!-- Indicators -->
      <div class="indicators">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>

<style type="text/css">
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
}

.hero-slider {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.slider-container {
  position: relative;
  height: 100%;
}

.slide {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  transition: 1s ease;
}

.slide.active {
  display: block;
  animation: fade 1s ease-in-out;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  background: rgba(0,0,0,0.4);
  color: #fff;
  padding: 20px 40px;
  border-radius: 10px;
}

/* Navigation Arrows */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: #fff;
  background: rgba(0,0,0,0.5);
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 50%;
  transition: 0.3s;
}

.prev:hover, .next:hover {
  background: rgba(0,0,0,0.8);
}

.prev {
  left: 20px;
}

.next {
  right: 20px;
}

/* Indicators */
.indicators {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

.dot {
  display: inline-block;
  height: 12px;
  width: 12px;
  margin: 0 5px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.dot.active {
  background: #fff;
  transform: scale(1.3);
}

@keyframes fade {
  from { opacity: 0.4; }
  to { opacity: 1; }
}
</style>

<script type="text/javascript">
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');
const nextBtn = document.querySelector('.next');
const prevBtn = document.querySelector('.prev');

let index = 0;

// Show slide
function showSlide(n) {
  slides.forEach((slide, i) => {
    slide.classList.remove('active');
    dots[i].classList.remove('active');
  });
  slides[n].classList.add('active');
  dots[n].classList.add('active');
}

// Next & Prev buttons
nextBtn.addEventListener('click', () => {
  index = (index + 1) % slides.length;
  showSlide(index);
});

prevBtn.addEventListener('click', () => {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
});

// Dot indicators
dots.forEach((dot, i) => {
  dot.addEventListener('click', () => {
    index = i;
    showSlide(index);
  });
});

// Auto slide every 5s
setInterval(() => {
  index = (index + 1) % slides.length;
  showSlide(index);
}, 5000);
</script>
</html>
